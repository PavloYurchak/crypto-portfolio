<div class="login-page">
  <mat-card class="login-card" appearance="outlined">
    <h1>Crypto Portfolio</h1>
    <p class="subtitle">Sign in to continue.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error *ngIf="form.controls.email.hasError('required')">Email is required.</mat-error>
        <mat-error *ngIf="form.controls.email.hasError('email')">Enter a valid email.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          autocomplete="current-password"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
          (click)="hidePassword = !hidePassword"
        >
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.controls.password.hasError('required')">Password is required.</mat-error>
        <mat-error *ngIf="form.controls.password.hasError('minlength')">Minimum 6 characters.</mat-error>
      </mat-form-field>

      <div class="submit-row">
        <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">Sign in</button>
        <button mat-stroked-button type="button" routerLink="/register">Register</button>
        <mat-progress-spinner *ngIf="isSubmitting" mode="indeterminate" diameter="20"></mat-progress-spinner>
      </div>
    </form>

    <p class="error" *ngIf="submitError">{{ submitError }}</p>
  </mat-card>
</div>
